apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: storybook
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/storybook
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
        env:
        - name: PORT
          value: "8080"
