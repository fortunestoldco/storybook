[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "storybook"
version = "0.1.0"
description = "A LangGraph Storybook application"
authors = [
    { name = "David", email = "david@example.com" } # REPLACE WITH YOUR DETAILS
]
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
"Homepage" = "https://github.com/yourusername/storybook" # REPLACE
"Bug Tracker" = "https://github.com/yourusername/storybook/issues" # REPLACE

[tool.setuptools]
packages = ["storybook"] # This *MUST* match the name of your package directory

[tool.setuptools.package-dir]
"storybook" = "src/storybook" # Link from the source directory for importing code

[tool.setuptools.install_requires]
langchain = ">=0.1.0" # UPDATE TO A *SPECIFIC, TESTED* VERSION IF YOU CAN
langgraph = ">=0.1.0" # UPDATE TO A *SPECIFIC, TESTED* VERSION IF YOU CAN
python-dotenv = ">=1.0.0" # UPDATE TO A *SPECIFIC, TESTED* VERSION IF YOU CAN
openai = ">=1.0.0"     # UPDATE TO A *SPECIFIC, TESTED* VERSION IF YOU CAN
tiktoken = ">=0.4.0"  # UPDATE TO A *SPECIFIC, TESTED* VERSION IF YOU CAN
# ADD ALL OTHER DEPENDENCIES WITH *SPECIFIC, TESTED* VERSIONS
# EXAMPLE:
# requests = "==2.28.1"

[tool.setuptools.exclude-package-data]
"*" = ["*.pyc"] # Exclude compiled python files

[tool.pytest.ini_options]
addopts = ["-v", "--cov"]
testpaths = ["tests"] # If you have tests/
