[project]
name = "storybook"
version = "0.1.0"
description = "Multi-agent system for collaborative story creation with research, writing, and publishing teams"
requires-python = ">=3.10"
readme = "README.md"
authors = [
    {name = "David James Lennon, Adventures of the Persistently Impaired (and Other Tales) Limited"}
]
dependencies = [
    "langgraph-server>=0.0.20",
    "langchain>=0.1.0",
    "langchain-openai>=0.0.2",
    "langchain-community>=0.0.10",
    "pydantic>=2.0.0,<3.0.0",
    "python-dotenv>=1.0.0",
    "pymongo>=4.5.0",
    "boto3>=1.28.0",
    "nltk>=3.8.1",
    "regex>=2023.0.0",
    "requests>=2.31.0",
    "openai>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "black>=23.7.0",
    "isort>=5.12.0",
    "mypy>=1.5.0"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
