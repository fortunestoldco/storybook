[tool.poetry]
name = "storybook"
version = "0.0.2"
description = "Generative-AI Research Led Fiction Workflow"
authors = ["David James Lennon david@fortunestold.co"]
readme = "README.md"
license = "MIT"
packages = [{include = "storybook"}]

[tool.poetry.dependencies]
python = "^3.12"
langgraph = "^0.2.74"
langchain = "^0.3.19"
langchain-openai = "^0.3.7"
pydantic = "^2.10.6"
openai = "^1.64.0"
pyyaml = "^6.0.2"
tiktoken = "^0.9.0"
tenacity = "^9.0.0"
fastapi = {version = "^0.115.0", optional = true}
uvicorn = {version = "^0.34.0", optional = true}

[tool.poetry.extras]
api = ["fastapi", "uvicorn"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.4"
black = "^25.1.0"
isort = "^6.0.0"
mypy = "^1.15.0"
pre-commit = "^4.1.0"
pytest-cov = "^6.0.0"

[tool.poetry.group.docs.dependencies]
mkdocs = "^1.6.1"
mkdocs-material = "^9.6.5"
mkdocstrings = {extras = ["python"], version = "^0.28.2"}

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
storybook = "storybook.main:main"
